<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Pippsza — Full Stack Developer">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b2b2b"/>
      <stop offset="100%" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FACC15"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#g1)" />

  <!-- Left dark panel subtle texture -->
  <rect x="40" y="60" width="720" height="510" rx="18" fill="rgba(255,255,255,0.02)" />

  <!-- Name and role -->
  <g transform="translate(120,150)">
    <text x="0" y="0" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="64" fill="url(#gold)">Astakhov Bohdan</text>
    <text x="0" y="70" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="28" fill="#9CA3AF">Full Stack Developer</text>

    <foreignObject x="0" y="100" width="680" height="220">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Inter, Helvetica, Arial, sans-serif; color: #9CA3AF; font-size:18px; line-height:1.6; max-width:680px;">
        I build modern web and mobile applications with cutting-edge technologies. Specializing in React, Next.js, Preact and cloud-native solutions.
      </div>
    </foreignObject>

    <!-- Buttons mockup -->
    <rect x="0" y="200" rx="10" width="190" height="44" fill="#FACC15" />
    <text x="26" y="232" font-family="Inter, sans-serif" font-size="16" fill="#0b0b0b" font-weight="600">Contact Me</text>
    <rect x="210" y="200" rx="10" width="190" height="44" fill="rgba(255,255,255,0.03)" stroke="#374151" />
    <text x="246" y="232" font-family="Inter, sans-serif" font-size="16" fill="#E5E7EB">View Projects</text>
  </g>

  <!-- Right circular emblem with code icon -->
  <g transform="translate(900,315)">
    <circle cx="0" cy="0" r="110" fill="#0b0b0b" stroke="url(#gold)" stroke-width="6" filter="url(#softGlow)" />
    <circle cx="0" cy="0" r="82" fill="rgba(0,0,0,0.3)" />
    <circle cx="0" cy="0" r="74" fill="#070707" stroke="rgba(255,255,255,0.02)" />

    <!-- Code slashes -->
    <g fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" transform="translate(-18,-12) scale(1.6)">
      <path d="M18 16l4-4-4-4" />
      <path d="M6 8L2 12l4 4" />
      <path d="M14.5 4L9.5 20" />
    </g>
  </g>

  <!-- Decorative golden lines -->
  <g stroke="url(#gold)" stroke-width="1.5" opacity="0.9">
    <line x1="200" y1="50" x2="200" y2="110" />
    <line x1="260" y1="480" x2="260" y2="560" />
    <line x1="720" y1="520" x2="720" y2="590" />
  </g>

  <!-- Footer small text -->
  <text x="40" y="610" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#6B7280">pippsza.dev • Astakhov Bohdan</text>
</svg>
